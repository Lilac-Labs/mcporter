name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip GitHub release creation)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ── Quality gates ─────────────────────────────────────────────────
  gates:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - run: pnpm test
        env:
          FIRECRAWL_API_KEY: test
          LINEAR_API_KEY: test

  # ── Build Bun binaries (one per platform) ─────────────────────────
  build-bun:
    needs: gates
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: mcporter-macos-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: mcporter-macos-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: mcporter-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - run: pnpm install --no-frozen-lockfile

      - name: Build Bun binary
        run: bun scripts/build-bun.ts --target ${{ matrix.target }} --output dist-bun/${{ matrix.artifact }}

      - name: Create tarball and checksum
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAR_NAME="${{ matrix.artifact }}-v${VERSION}.tar.gz"
          tar -C dist-bun -czf "dist-bun/${TAR_NAME}" "${{ matrix.artifact }}"
          shasum -a 256 "dist-bun/${TAR_NAME}" > "dist-bun/${TAR_NAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist-bun/*.tar.gz
            dist-bun/*.sha256

  # ── GitHub release with all assets ────────────────────────────────
  release:
    needs: [gates, build-bun]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

      - name: Create npm tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pack --pack-destination .
          shasum "mcporter-${VERSION}.tgz" > "mcporter-${VERSION}.tgz.sha1"
          shasum -a 256 "mcporter-${VERSION}.tgz" > "mcporter-${VERSION}.tgz.sha256"

      - name: Download all Bun artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#v}"
          cp "mcporter-${VERSION}.tgz" release-assets/
          cp "mcporter-${VERSION}.tgz.sha1" release-assets/
          cp "mcporter-${VERSION}.tgz.sha256" release-assets/
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk '/^## \[Unreleased\]|^## \['"${VERSION}"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          CHECKSUMS=$(cd release-assets && cat *.sha256)
          {
            echo "${NOTES}"
            echo ""
            echo "### Checksums (SHA256)"
            echo '```'
            echo "${CHECKSUMS}"
            echo '```'
            echo ""
            echo "### Install"
            echo '```bash'
            echo "# via npm tarball from this release"
            echo "npm install https://github.com/Lilac-Labs/mcporter/releases/download/v${VERSION}/mcporter-${VERSION}.tgz"
            echo '```'
          } > release-notes.md

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo Lilac-Labs/mcporter \
            --title "mcporter ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            release-assets/*
